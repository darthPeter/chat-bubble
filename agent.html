<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Dashboard</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#f1f5f9;color:#1e293b;height:100vh;overflow:hidden}

    /* ── Login ──────────────────────────────────────────────── */
    .login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(135deg,#1e293b 0%,#334155 100%)}
    .login-card{background:#fff;border-radius:12px;padding:40px;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .login-card h1{font-size:22px;margin-bottom:24px;text-align:center;color:#1e293b}
    .login-card input{width:100%;padding:12px 16px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none;font-family:inherit}
    .login-card input:focus{border-color:#3b82f6}
    .login-card button{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
    .login-card button:hover{background:#2563eb}
    .login-card button:disabled{opacity:.6;cursor:default}
    .login-error{color:#dc2626;font-size:13px;text-align:center;margin-top:12px;display:none}

    /* ── Dashboard layout ───────────────────────────────────── */
    .dashboard{display:none;height:100vh}
    .dashboard.active{display:flex}

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar{width:320px;background:#1e293b;color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-header{padding:16px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
    .sidebar-header h2{font-size:16px;font-weight:600}
    .toggle-wrap{display:flex;align-items:center;gap:8px}
    .toggle-label{font-size:12px;font-weight:500}
    .toggle{position:relative;width:40px;height:22px;background:#475569;border-radius:11px;cursor:pointer;transition:background .2s;border:none}
    .toggle.on{background:#22c55e}
    .toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:transform .2s}
    .toggle.on::after{transform:translateX(18px)}

    .conn-status{padding:6px 16px;font-size:11px;text-align:center;display:none;flex-shrink:0}
    .conn-status.visible{display:block}
    .conn-status.warn{background:#fef3c7;color:#92400e}
    .conn-status.error{background:#fee2e2;color:#991b1b}

    .conv-list{flex:1;overflow-y:auto;padding:8px}
    .conv-empty{padding:24px 20px;text-align:center;opacity:.5;font-size:13px}
    .conv-item{padding:12px;border-radius:8px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:3px}
    .conv-item:hover{background:#334155}
    .conv-item.active{background:#3b82f6;color:#fff}
    .conv-item-row{display:flex;justify-content:space-between;align-items:center}
    .conv-client{font-size:11px;font-weight:600;text-transform:uppercase;opacity:.7}
    .conv-time{font-size:11px;opacity:.6}
    .conv-user{font-size:13px;font-weight:500}
    .conv-preview{font-size:12px;opacity:.6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .conv-unread{background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
    .conv-item.active .conv-unread{background:rgba(255,255,255,.3)}

    .sidebar-footer{padding:12px 20px;border-top:1px solid #334155;display:flex;align-items:center;justify-content:space-between}
    .agent-name{font-size:13px;opacity:.7}
    .btn-logout{background:none;border:1px solid #475569;color:#94a3b8;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
    .btn-logout:hover{border-color:#94a3b8;color:#e2e8f0}

    /* ── Main area ──────────────────────────────────────────── */
    .main{flex:1;display:flex;flex-direction:column;background:#f8fafc;min-width:0}
    .empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:15px}

    .chat-header{padding:14px 20px;background:#fff;border-bottom:1px solid #e2e8f0;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
    .chat-header.active{display:flex}
    .chat-user-name{font-size:14px;font-weight:600}
    .chat-user-client{font-size:12px;color:#64748b}
    .btn-resolve{background:#f59e0b;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-resolve:hover{background:#d97706}

    .chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:none;flex-direction:column;gap:6px}
    .chat-messages.active{display:flex}
    .msg{max-width:70%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.45;word-wrap:break-word}
    .msg.user{align-self:flex-start;background:#fff;border:1px solid #e2e8f0;border-bottom-left-radius:4px}
    .msg.bot{align-self:flex-start;background:#f1f5f9;border:1px solid #e2e8f0;border-bottom-left-radius:4px;opacity:.65}
    .msg.agent{align-self:flex-end;background:#3b82f6;color:#fff;border-bottom-right-radius:4px}
    .msg.system{align-self:center;background:#fef3c7;color:#92400e;font-size:12px;padding:6px 14px;border-radius:20px;max-width:90%}
    .msg-label{font-size:11px;font-weight:600;margin-bottom:2px;opacity:.6}

    .chat-input-area{display:none;align-items:center;gap:8px;padding:14px 20px;border-top:1px solid #e2e8f0;background:#fff;flex-shrink:0}
    .chat-input-area.active{display:flex}
    .chat-input{flex:1;border:1px solid #d1d5db;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;max-height:100px;line-height:1.4}
    .chat-input:focus{border-color:#3b82f6}
    .btn-send{width:38px;height:38px;border-radius:50%;border:none;background:#3b82f6;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-send:disabled{opacity:.4;cursor:default}
    .btn-send svg{width:18px;height:18px}

    /* ── Scrollbars ─────────────────────────────────────────── */
    .conv-list::-webkit-scrollbar,.chat-messages::-webkit-scrollbar{width:6px}
    .conv-list::-webkit-scrollbar-track,.chat-messages::-webkit-scrollbar-track{background:transparent}
    .conv-list::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
    .chat-messages::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

    /* ── Mobile ─────────────────────────────────────────────── */
    @media(max-width:768px){
      .sidebar{width:260px}
    }
    @media(max-width:600px){
      .dashboard.active{flex-direction:column}
      .sidebar{width:100%;max-height:45vh}
      .main{min-height:55vh}
    }
  </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Agent Dashboard</h1>
    <input type="text" id="loginUser" placeholder="Username" autocomplete="username">
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Conversations</h2>
      <div class="toggle-wrap">
        <span class="toggle-label" id="toggleLabel">Offline</span>
        <button class="toggle" id="onlineToggle" aria-label="Toggle online status"></button>
      </div>
    </div>
    <div class="conn-status" id="connStatus"></div>
    <div class="conv-list" id="convList">
      <div class="conv-empty">No active conversations</div>
    </div>
    <div class="sidebar-footer">
      <span class="agent-name" id="agentName"></span>
      <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="chat-header" id="chatHeader">
      <div>
        <div class="chat-user-name" id="chatUserName"></div>
        <div class="chat-user-client" id="chatUserClient"></div>
      </div>
      <button class="btn-resolve" id="resolveBtn">Resolve</button>
    </div>
    <div class="empty-state" id="emptyState">Select a conversation to start chatting</div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area" id="chatInputArea">
      <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a reply..."></textarea>
      <button class="btn-send" id="sendBtn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
"use strict";

// ── Config ─────────────────────────────────────────────────────
const TOKEN_ENDPOINT = "https://n8n.srv1104100.hstgr.cloud/webhook/agent-token";
const STATUS_ENDPOINT = "https://n8n.srv1104100.hstgr.cloud/webhook/agent-status";
const TWILIO_SDK_URL = "https://media.twiliocdn.com/sdk/js/conversations/v2.1/twilio-conversations.min.js";

// ── Twilio SDK loader (reused from widget.js) ──────────────────
function loadTwilioSDK() {
  return new Promise((resolve, reject) => {
    if (window.Twilio && window.Twilio.Conversations) return resolve(window.Twilio.Conversations);
    const s = document.createElement("script");
    s.src = TWILIO_SDK_URL;
    s.onload = () => resolve(window.Twilio.Conversations);
    s.onerror = () => reject(new Error("Failed to load Twilio SDK"));
    document.head.appendChild(s);
  });
}
const twilioSDKReady = loadTwilioSDK();

// ── State ──────────────────────────────────────────────────────
let twilioClient = null;
let agentIdentity = "";
let storedCreds = null;           // { username, password } kept in memory for token refresh
let activeConversation = null;
const conversations = new Map();  // sid → { conversation, lastMessage, unreadCount }
let allowedClients = [];          // client_ids this agent can see (empty = all)
let isOnline = false;
let totalUnread = 0;

// ── DOM refs ───────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const loginScreen   = $("loginScreen");
const loginUser     = $("loginUser");
const loginPass     = $("loginPass");
const loginBtn      = $("loginBtn");
const loginError    = $("loginError");
const dashboard     = $("dashboard");
const connStatus    = $("connStatus");
const convList      = $("convList");
const agentNameEl   = $("agentName");
const logoutBtn     = $("logoutBtn");
const onlineToggle  = $("onlineToggle");
const toggleLabel   = $("toggleLabel");
const chatHeader    = $("chatHeader");
const chatUserName  = $("chatUserName");
const chatUserClient= $("chatUserClient");
const chatMessages  = $("chatMessages");
const chatInputArea = $("chatInputArea");
const chatInput     = $("chatInput");
const sendBtn       = $("sendBtn");
const resolveBtn    = $("resolveBtn");
const emptyState    = $("emptyState");

// ── Demo mode (?demo in URL) ───────────────────────────────────
const DEMO = new URLSearchParams(window.location.search).has("demo");
if (DEMO) initDemo();

function initDemo() {
  agentIdentity = "agent_demo";
  agentNameEl.textContent = agentIdentity;
  loginScreen.style.display = "none";
  dashboard.classList.add("active");

  const now = new Date();
  const mockConvs = [
    { sid: "demo_1", client_id: "digishares", user: "digishares_user_a1b2", time: new Date(now - 120000),
      messages: [
        { author: "digishares_user_a1b2", body: "Hi, I have a question about tokenization", time: new Date(now - 300000) },
        { author: "bot", body: "Hello! I'd be happy to help with tokenization. What would you like to know?", time: new Date(now - 280000) },
        { author: "digishares_user_a1b2", body: "I want to talk to a real person please", time: new Date(now - 200000) },
        { author: "bot", body: "Of course! Let me connect you with our support team.", time: new Date(now - 190000) },
        { author: "system", body: "Connecting you with support\u2026", time: new Date(now - 180000) },
        { author: "digishares_user_a1b2", body: "Thanks, I need help with my KYC verification", time: new Date(now - 120000) },
      ]},
    { sid: "demo_2", client_id: "alkoholcz", user: "alkoholcz_user_x9y8", time: new Date(now - 600000), unread: 2,
      messages: [
        { author: "alkoholcz_user_x9y8", body: "Dobry den, mam problem s objednavkou", time: new Date(now - 900000) },
        { author: "bot", body: "Dobry den! Litujeme, ze mate problem. Muzete mi rici cislo objednavky?", time: new Date(now - 880000) },
        { author: "alkoholcz_user_x9y8", body: "Cislo je 123456 a nic neprislo", time: new Date(now - 700000) },
        { author: "bot", body: "Prepojuji vas na naseho kolegu, ktery vam pomuze.", time: new Date(now - 690000) },
        { author: "system", body: "Connecting you with support\u2026", time: new Date(now - 680000) },
        { author: "alkoholcz_user_x9y8", body: "Uz to trva dlouho, kde je moje zasilka?", time: new Date(now - 620000) },
        { author: "alkoholcz_user_x9y8", body: "Prosim odpovezte", time: new Date(now - 600000) },
      ]},
  ];

  // Build mock conversation objects
  mockConvs.forEach((mc) => {
    const lastMsg = mc.messages[mc.messages.length - 1];
    const mockConv = {
      sid: mc.sid,
      friendlyName: mc.user,
      attributes: { client_id: mc.client_id, mode: "agent" },
      _messages: mc.messages,
      on() {},
      async getMessages() {
        return { items: mc.messages.map((m) => ({ author: m.author, body: m.body, dateCreated: m.time })) };
      },
      async setAllMessagesRead() {},
      async sendMessage(text) {
        const msg = { author: agentIdentity, body: text, dateCreated: new Date() };
        mc.messages.push(msg);
        const entry = conversations.get(mc.sid);
        if (entry) entry.lastMessage = msg;
        appendMsg(msg);
        renderList();
      },
      async updateAttributes(a) { this.attributes = a; },
      async leave() {},
    };
    conversations.set(mc.sid, {
      conversation: mockConv,
      lastMessage: { body: lastMsg.body, dateCreated: lastMsg.time, author: lastMsg.author },
      unreadCount: mc.unread || 0,
    });
  });
  renderList();
}

// ── Auth ───────────────────────────────────────────────────────
loginBtn.addEventListener("click", login);
loginUser.addEventListener("keydown", (e) => e.key === "Enter" && loginPass.focus());
loginPass.addEventListener("keydown", (e) => e.key === "Enter" && login());

async function login() {
  const user = loginUser.value.trim();
  const pass = loginPass.value.trim();
  if (!user || !pass) return;

  loginBtn.disabled = true;
  loginBtn.textContent = "Signing in\u2026";
  loginError.style.display = "none";

  try {
    const resp = await fetch(TOKEN_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || "Invalid credentials");
    }
    const data = await resp.json();
    agentIdentity = data.identity || "agent_" + user;
    allowedClients = data.clients || [];
    storedCreds = { username: user, password: pass };
    agentNameEl.textContent = agentIdentity;

    loginScreen.style.display = "none";
    dashboard.classList.add("active");
    await connectTwilio(data.token, data.region);
  } catch (err) {
    loginError.textContent = err.message;
    loginError.style.display = "block";
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = "Sign In";
  }
}

// ── Logout ─────────────────────────────────────────────────────
logoutBtn.addEventListener("click", async () => {
  if (DEMO) { location.href = location.pathname; return; }
  if (isOnline) await setOnline(false);
  if (twilioClient) { try { await twilioClient.shutdown(); } catch {} }
  twilioClient = null;
  activeConversation = null;
  conversations.clear();
  storedCreds = null;
  isOnline = false;
  onlineToggle.classList.remove("on");
  toggleLabel.textContent = "Offline";
  selectConversation(null);
  dashboard.classList.remove("active");
  loginScreen.style.display = "flex";
  loginPass.value = "";
  loginError.style.display = "none";
  updateTitle();
});

// ── Twilio connection ──────────────────────────────────────────
async function connectTwilio(token, region) {
  setConn("Connecting\u2026", "warn");
  try {
    const SDK = await twilioSDKReady;
    twilioClient = await SDK.Client.create(token, region ? { region } : {});

    // Load existing conversations
    const paginator = await twilioClient.getSubscribedConversations();
    for (const conv of paginator.items) await trackConversation(conv);
    renderList();

    // Real-time events
    twilioClient.on("conversationAdded", async (conv) => {
      await trackConversation(conv);
      renderList();
      notifyHandoff(conv);
    });
    twilioClient.on("conversationRemoved", (conv) => {
      conversations.delete(conv.sid);
      if (activeConversation?.sid === conv.sid) selectConversation(null);
      renderList();
    });

    // Connection state
    twilioClient.on("connectionStateChanged", (state) => {
      if (state === "connected") setConn("", "");
      else if (state === "connecting") setConn("Reconnecting\u2026", "warn");
      else if (state === "disconnected") setConn("Disconnected. Reconnecting\u2026", "error");
      else if (state === "denied") setConn("Connection denied. Please re-login.", "error");
    });

    // Token refresh
    twilioClient.on("tokenAboutToExpire", async () => {
      if (!storedCreds) return;
      try {
        const r = await fetch(TOKEN_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ...storedCreds, refresh: true }),
        });
        const d = await r.json();
        await twilioClient.updateToken(d.token);
      } catch (err) { console.error("[Agent] Token refresh failed:", err); }
    });

    setConn("", "");
  } catch (err) {
    console.error("[Agent] Connection error:", err);
    setConn("Connection failed: " + err.message, "error");
  }
}

// ── Conversation tracking ──────────────────────────────────────
async function trackConversation(conv) {
  // Client filter — only track conversations for assigned clients
  if (allowedClients.length > 0) {
    const attrs = typeof conv.attributes === "string" ? tryParse(conv.attributes) : (conv.attributes || {});
    if (attrs.client_id && !allowedClients.includes(attrs.client_id)) return;
  }

  let lastMsg = null, unread = 0;
  try {
    const msgs = await conv.getMessages(1);
    lastMsg = msgs.items[0] || null;
    unread = (await conv.getUnreadMessageCount()) ?? 0;
  } catch {}

  conversations.set(conv.sid, { conversation: conv, lastMessage: lastMsg, unreadCount: unread });

  conv.on("messageAdded", (msg) => {
    const entry = conversations.get(conv.sid);
    if (!entry) return;
    entry.lastMessage = msg;
    if (activeConversation?.sid !== conv.sid) entry.unreadCount++;
    renderList();
    if (activeConversation?.sid === conv.sid) {
      appendMsg(msg);
      conv.setAllMessagesRead().catch(() => {});
    }
  });
}

// ── Conversation list UI ───────────────────────────────────────
function renderList() {
  if (conversations.size === 0) {
    convList.innerHTML = '<div class="conv-empty">No active conversations</div>';
    updateTitle();
    return;
  }

  const sorted = [...conversations.entries()].sort((a, b) => {
    const tA = a[1].lastMessage?.dateCreated?.getTime() || 0;
    const tB = b[1].lastMessage?.dateCreated?.getTime() || 0;
    return tB - tA;
  });

  convList.innerHTML = sorted.map(([sid, entry]) => {
    const conv = entry.conversation;
    const isActive = activeConversation?.sid === sid;
    const attrs = typeof conv.attributes === "string" ? tryParse(conv.attributes) : (conv.attributes || {});
    const clientId = attrs.client_id || "unknown";
    const userName = conv.friendlyName || sid.substring(0, 14);
    const preview = entry.lastMessage?.body?.substring(0, 60) || "No messages";
    const time = entry.lastMessage?.dateCreated ? fmtTime(entry.lastMessage.dateCreated) : "";
    const badge = entry.unreadCount > 0 && !isActive
      ? `<span class="conv-unread">${entry.unreadCount}</span>` : "";

    return `<div class="conv-item${isActive ? " active" : ""}" data-sid="${sid}">
      <div class="conv-item-row"><span class="conv-client">${esc(clientId)}</span><span class="conv-time">${time} ${badge}</span></div>
      <div class="conv-user">${esc(userName)}</div>
      <div class="conv-preview">${esc(preview)}</div>
    </div>`;
  }).join("");

  convList.querySelectorAll(".conv-item").forEach((el) => {
    el.addEventListener("click", () => {
      const entry = conversations.get(el.dataset.sid);
      if (entry) selectConversation(entry.conversation);
    });
  });

  updateTitle();
}

// ── Select conversation ────────────────────────────────────────
async function selectConversation(conv) {
  activeConversation = conv;
  if (!conv) {
    chatHeader.classList.remove("active");
    chatMessages.classList.remove("active");
    chatInputArea.classList.remove("active");
    emptyState.style.display = "flex";
    renderList();
    return;
  }

  emptyState.style.display = "none";
  chatHeader.classList.add("active");
  chatMessages.classList.add("active");
  chatInputArea.classList.add("active");

  const attrs = typeof conv.attributes === "string" ? tryParse(conv.attributes) : (conv.attributes || {});
  chatUserName.textContent = conv.friendlyName || conv.sid.substring(0, 18);
  chatUserClient.textContent = attrs.client_id || "unknown client";

  chatMessages.innerHTML = "";
  try {
    const paginator = await conv.getMessages(50);
    paginator.items.forEach((m) => appendMsg(m));
    chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: "instant" });
    await conv.setAllMessagesRead();
  } catch (err) { console.error("[Agent] Load messages failed:", err); }

  const entry = conversations.get(conv.sid);
  if (entry) entry.unreadCount = 0;
  renderList();
  chatInput.focus();
}

// ── Messages ───────────────────────────────────────────────────
function appendMsg(msg) {
  if (msg.body === "[system] generate welcome message") return;

  const author = msg.author || "";
  let type = "user";
  if (author === "bot") type = "bot";
  else if (author === "system") type = "system";
  else if (author.startsWith("agent_")) type = "agent";

  const el = document.createElement("div");
  el.className = "msg " + type;

  if (type !== "agent" && type !== "system") {
    const lbl = document.createElement("div");
    lbl.className = "msg-label";
    lbl.textContent = type === "bot" ? "AI Bot" : author;
    el.appendChild(lbl);
  }

  const body = document.createElement("div");
  body.textContent = msg.body;
  el.appendChild(body);

  chatMessages.appendChild(el);
  chatMessages.scrollTo({ top: chatMessages.scrollHeight, behavior: "smooth" });
}

// ── Send ───────────────────────────────────────────────────────
chatInput.addEventListener("input", () => {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + "px";
  sendBtn.disabled = !chatInput.value.trim();
});
chatInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener("click", sendMessage);

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || !activeConversation) return;
  chatInput.value = "";
  chatInput.style.height = "auto";
  sendBtn.disabled = true;
  try { await activeConversation.sendMessage(text); }
  catch (err) { console.error("[Agent] Send failed:", err); }
}

// ── Resolve ────────────────────────────────────────────────────
resolveBtn.addEventListener("click", async () => {
  if (!activeConversation) return;
  if (!confirm("Resolve this conversation and return it to AI?")) return;

  try {
    const attrs = typeof activeConversation.attributes === "string"
      ? tryParse(activeConversation.attributes) : (activeConversation.attributes || {});
    await activeConversation.updateAttributes({
      ...attrs,
      mode: "ai",
      last_handoff_resolved: new Date().toISOString(),
    });
    await activeConversation.sendMessage("You\u2019re now back with the AI assistant. How can I help?");
    await activeConversation.leave();

    conversations.delete(activeConversation.sid);
    selectConversation(null);
    renderList();
  } catch (err) {
    console.error("[Agent] Resolve failed:", err);
    alert("Failed to resolve: " + err.message);
  }
});

// ── Online/Offline toggle ──────────────────────────────────────
onlineToggle.addEventListener("click", () => setOnline(!isOnline));

async function setOnline(state) {
  try {
    await fetch(STATUS_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ online: state, identity: agentIdentity }),
    });
  } catch (err) {
    console.warn("[Agent] Status endpoint not available yet:", err.message);
  }
  isOnline = state;
  onlineToggle.classList.toggle("on", isOnline);
  toggleLabel.textContent = isOnline ? "Online" : "Offline";
}

// ── Browser notifications ──────────────────────────────────────
function notifyHandoff(conv) {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") Notification.requestPermission();
  if (Notification.permission !== "granted") return;
  const attrs = typeof conv.attributes === "string" ? tryParse(conv.attributes) : (conv.attributes || {});
  new Notification("New handoff", {
    body: (attrs.client_id || "Unknown") + " \u2014 a user needs help",
  });
}

// ── Helpers ────────────────────────────────────────────────────
function setConn(text, type) {
  if (!text) { connStatus.classList.remove("visible"); return; }
  connStatus.textContent = text;
  connStatus.className = "conn-status visible " + (type || "");
}

function updateTitle() {
  totalUnread = [...conversations.values()].reduce((n, e) => n + (e.unreadCount || 0), 0);
  document.title = totalUnread > 0 ? `(${totalUnread}) Agent Dashboard` : "Agent Dashboard";
}

function fmtTime(d) {
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return "now";
  if (diff < 3600000) return Math.floor(diff / 60000) + "m";
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  return d.toLocaleDateString([], { month: "short", day: "numeric" });
}

function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
function tryParse(s) { try { return JSON.parse(s); } catch { return {}; } }
</script>
