<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pompo.cz</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .fallback {
      display: none;
      position: absolute;
      inset: 0;
      background: #f8f9fa;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      padding-top: 40vh;
      color: #333;
    }
    .fallback h1 { color: #e63946; margin-bottom: 8px; }
    .fallback p { color: #666; }
    iframe:not([src]) + .fallback,
    .fallback.show { display: block; }
  </style>
</head>
<body>
  <iframe
    src="https://pompo.cz"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    loading="lazy"
    onerror="document.querySelector('.fallback').classList.add('show')"
  ></iframe>
  <div class="fallback">
    <h1>Pompo.cz</h1>
    <p>Iframe blocked by the site — chat widget still works in the corner.</p>
  </div>

  <!-- Chat Bubble Widget -->
  <script
    src="./widget.js"
    data-webhook="https://n8n.srv1104100.hstgr.cloud/webhook/chat-token"
    data-theme="pompo"
    data-title="Pompo.cz"
    data-logo="https://data.pompo.cz/templates/images/logo.svg"
    data-client-key="cb5b910b75f235a374b6f9b1b4956790593aef05c8d5f5c9"
    data-client-id="pompo"
  ></script>
</body>
</html>
